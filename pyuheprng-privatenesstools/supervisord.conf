[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:pyuheprng]
directory=/app/pyuheprng
command=python server.py
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/pyuheprng.err.log
stdout_logfile=/var/log/supervisor/pyuheprng.out.log
environment=EMERCOIN_HOST="%(ENV_EMERCOIN_HOST)s",EMERCOIN_PORT="%(ENV_EMERCOIN_PORT)s",EMERCOIN_USER="%(ENV_EMERCOIN_USER)s",EMERCOIN_PASS="%(ENV_EMERCOIN_PASS)s"

[program:privatenesstools]
directory=/app/privatenesstools
command=python -m privatenesstools.server --host 0.0.0.0 --port 8888
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/privatenesstools.err.log
stdout_logfile=/var/log/supervisor/privatenesstools.out.log
environment=EMERCOIN_HOST="%(ENV_EMERCOIN_HOST)s",EMERCOIN_PORT="%(ENV_EMERCOIN_PORT)s",EMERCOIN_USER="%(ENV_EMERCOIN_USER)s",EMERCOIN_PASS="%(ENV_EMERCOIN_PASS)s"

; PyUHEPRNG Reseeder - regenerates entropy every 10 seconds
[program:pyuheprng-reseeder]
directory=/app/pyuheprng
command=bash -c 'while true; do sleep 10; curl -s -X POST http://localhost:5000/reseed || python -c "import pyuheprng; pyuheprng.reseed()"; done'
autostart=false  ; Disabled by default, enable with RESEED_INTERVAL env
autorestart=true
stderr_logfile=/var/log/supervisor/reseeder.err.log
stdout_logfile=/var/log/supervisor/reseeder.out.log
