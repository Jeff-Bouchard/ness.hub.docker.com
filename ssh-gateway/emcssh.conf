# EmerSSH config — generated at container start by entrypoint.sh
# emcurl is written at runtime from EMC_RPC_USER / EMC_RPC_PASS env vars
# pointing to emercoin-core on 127.0.0.1:6662 (same netns as softether-vpn)
emcurl http://EMCRPCUSER:EMCRPCPASS@127.0.0.1:6662/

ssl_check       0
verbose         2
maxkeys         4096
emcssh_keys     /etc/emercoin/emcssh.keys.d/$U
recursion       10
timio           15

# fallback_disable 1   # uncomment to block external NVS fallbacks (air-gapped)
