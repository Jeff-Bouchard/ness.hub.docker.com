name: Build and Push Multi-Architecture Images

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths:
      - '*/Dockerfile'
      - '*/entrypoint.sh'
      - '*/supervisord.conf'
      - '.github/workflows/build-push-multiarch.yml'
  pull_request:
    branches:
      - master
    paths:
      - '*/Dockerfile'

env:
  REGISTRY: docker.io
  IMAGE_NAME: nessnetwork

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - emercoin-core
          - yggdrasil
          - dns-reverse-proxy
          - skywire
          - privateness
          - ness-blockchain
          - pyuheprng-privatenesstools
          - ipfs
          - i2p-yggdrasil
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.image }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:buildcache,mode=max

  build-status:
    needs: build-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build results
        run: |
          if [ "${{ needs.build-matrix.result }}" == "failure" ]; then
            echo "One or more builds failed"
            exit 1
          fi
          echo "All images built and pushed successfully"
