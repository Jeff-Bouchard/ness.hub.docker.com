<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>NESS Hub Mobile</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-size: 16px;
}
.header {
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: 12px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  margin: 0;
  font-size: 20px;
  color: #58a6ff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header .meta {
  font-size: 12px;
  color: #8b949e;
  margin-top: 4px;
}

/* Status Cards */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px;
}
.status-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}
.status-card.tier1 { border-left: 4px solid #238636; }
.status-card.tier2 { border-left: 4px solid #8957e5; }
.status-card.tier3 { border-left: 4px solid #d29922; }
.status-card h3 {
  margin: 0 0 8px 0;
  font-size: 13px;
  color: #8b949e;
  text-transform: uppercase;
}
.status-card .status {
  font-size: 24px;
  font-weight: bold;
}
.status-card .status.running { color: #238636; }
.status-card .status.stopped { color: #da3633; }
.status-card .count {
  font-size: 12px;
  color: #6e7681;
  margin-top: 4px;
}

/* Service List */
.services {
  padding: 0 12px 12px;
}
.service-item {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}
.service-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
}
.service-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  background: #21262d;
}
.service-info {
  flex: 1;
}
.service-name {
  font-weight: 600;
  font-size: 15px;
}
.service-tier {
  font-size: 11px;
  color: #8b949e;
  text-transform: uppercase;
}
.service-status {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.service-status.running { background: #23863622; color: #3fb950; }
.service-status.stopped { background: #da363322; color: #f85149; }
.service-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #30363d;
  border-top: 1px solid #30363d;
}
.service-btn {
  background: #161b22;
  border: none;
  color: #c9d1d9;
  padding: 14px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.service-btn:active { background: #21262d; }
.service-btn.start { color: #3fb950; }
.service-btn.stop { color: #f85149; }
.service-btn.restart { color: #d29922; }
.service-btn.logs { color: #58a6ff; }

/* Global Actions */
.actions {
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.action-btn {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 10px;
  color: #c9d1d9;
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.action-btn:active { transform: scale(0.98); }
.action-btn.primary { background: #238636; border-color: #238636; color: white; }
.action-btn.danger { background: #da3633; border-color: #da3633; color: white; }
.action-btn .icon { font-size: 24px; }

/* Output Panel */
.output-panel {
  background: #0d1117;
  border-top: 1px solid #30363d;
  max-height: 200px;
  overflow-y: auto;
}
.output-header {
  padding: 10px 16px;
  background: #161b22;
  font-size: 12px;
  color: #8b949e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.output-content {
  padding: 12px 16px;
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 12px;
  white-space: pre-wrap;
  line-height: 1.5;
}

/* Reseed Toggle */
.reseed-bar {
  margin: 12px;
  padding: 12px 16px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.reseed-bar.active { border-color: #238636; }
.reseed-info { font-size: 14px; }
.reseed-toggle {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 20px;
  color: #c9d1d9;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
}

/* Loading */
.loading {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0d1117ee;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 1000;
}
.loading.active { display: flex; }
.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #30363d;
  border-top-color: #58a6ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <h1>🖧 NESS Hub</h1>
  <div class="meta" id="meta">Profile: pi3 | Engine: podman</div>
</div>

<div class="status-grid">
  <div class="status-card tier1">
    <h3>Tier 1</h3>
    <div class="status running" id="tier1-status">●</div>
    <div class="count" id="tier1-count">0/4 running</div>
  </div>
  <div class="status-card tier2">
    <h3>Tier 2</h3>
    <div class="status stopped" id="tier2-status">○</div>
    <div class="count" id="tier2-count">0/2 running</div>
  </div>
</div>

<div class="reseed-bar" id="reseed-bar">
  <div class="reseed-info">
    <strong>Reseeding</strong>
    <div style="font-size: 12px; color: #8b949e;" id="reseed-text">Disabled</div>
  </div>
  <button class="reseed-toggle" onclick="toggleReseed()">Configure</button>
</div>

<div class="actions">
  <button class="action-btn primary" onclick="startAll()">
    <span class="icon">▶</span>
    <span>Start All</span>
  </button>
  <button class="action-btn danger" onclick="stopAll()">
    <span class="icon">⏹</span>
    <span>Stop All</span>
  </button>
  <button class="action-btn" onclick="restartAll()">
    <span class="icon">🔄</span>
    <span>Restart</span>
  </button>
  <button class="action-btn" onclick="healthCheck()">
    <span class="icon">💓</span>
    <span>Health</span>
  </button>
</div>

<div class="services" id="services">
  <!-- Services populated by JS -->
</div>

<div class="output-panel">
  <div class="output-header">
    <span>Terminal Output</span>
    <button onclick="clearOutput()" style="background:none;border:none;color:#8b949e;cursor:pointer;">Clear</button>
  </div>
  <div class="output-content" id="output">Ready. Tap a button to execute.</div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>Executing...</div>
</div>

<script>
const SERVICES = {
  tier1: [
    { id: 'emercoin-core', name: 'Emercoin Core', icon: '⛓️', ports: [6661, 6662] },
    { id: 'privateness', name: 'Privateness', icon: '🔒', ports: [6660, 6006] },
    { id: 'skywire', name: 'Skywire', icon: '📡', ports: [8000] },
    { id: 'pyuheprng-privatenesstools', name: 'Tools', icon: '🎲', ports: [5000, 8888] }
  ],
  tier2: [
    { id: 'yggdrasil', name: 'Yggdrasil', icon: '🌲', ports: [9001] },
    { id: 'i2p-yggdrasil', name: 'I2P+Ygg', icon: '🔐', ports: [7657, 4444, 9002] }
  ],
  tier3: [
    { id: 'dns-reverse-proxy', name: 'DNS Proxy', icon: '🌐', ports: [1053, 8053] }
  ]
};

let reseedInterval = null;
let profile = 'pi3';

function log(msg) {
  const out = document.getElementById('output');
  const time = new Date().toLocaleTimeString();
  out.textContent += `[${time}] ${msg}\n`;
  out.scrollTop = out.scrollHeight;
}

function setLoading(show) {
  document.getElementById('loading').classList.toggle('active', show);
}

async function exec(cmd) {
  setLoading(true);
  log(`$ ${cmd}`);
  try {
    // In real implementation, this would call a backend API
    // For now, simulate with fetch or show intent
    await new Promise(r => setTimeout(r, 500));
    log('(Would execute via backend API)');
  } catch (e) {
    log(`Error: ${e.message}`);
  }
  setLoading(false);
  refreshStatus();
}

function renderServices() {
  const container = document.getElementById('services');
  container.innerHTML = '';
  
  const allServices = [...SERVICES.tier1, ...(profile === 'full' ? [...SERVICES.tier2, ...SERVICES.tier3] : [])];
  
  allServices.forEach(svc => {
    const tier = SERVICES.tier1.find(s => s.id === svc.id) ? 1 : 
                 SERVICES.tier2.find(s => s.id === svc.id) ? 2 : 3;
    
    const div = document.createElement('div');
    div.className = 'service-item';
    div.innerHTML = `
      <div class="service-header">
        <div class="service-icon">${svc.icon}</div>
        <div class="service-info">
          <div class="service-name">${svc.name}</div>
          <div class="service-tier">Tier ${tier}</div>
        </div>
        <div class="service-status stopped" id="status-${svc.id}">STOPPED</div>
      </div>
      <div class="service-actions">
        <button class="service-btn start" onclick="containerAction('${svc.id}', 'start')">Start</button>
        <button class="service-btn stop" onclick="containerAction('${svc.id}', 'stop')">Stop</button>
        <button class="service-btn restart" onclick="containerAction('${svc.id}', 'restart')">Restart</button>
        <button class="service-btn logs" onclick="containerAction('${svc.id}', 'logs')">Logs</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function containerAction(id, action) {
  const commands = {
    start: `podman start ${id} || podman-compose up -d ${id}`,
    stop: `podman stop ${id}; podman rm -f ${id}`,
    restart: `podman restart ${id} || (podman stop ${id}; podman start ${id})`,
    logs: `podman logs -f --tail=50 ${id}`,
    cleanup: `podman stop ${id}; podman rm -f ${id}; podman image rm ${id}`
  };
  exec(commands[action]);
}

function startAll() {
  const cmd = reseedInterval 
    ? `RESEED_INTERVAL=${reseedInterval} ./menu <<< "1"`
    : `./menu <<< "1"`;
  exec(cmd);
}

function stopAll() { exec('./menu <<< "2"'); }
function restartAll() { exec('./menu <<< "3"'); }
function healthCheck() { exec('./menu <<< "6"'); }

function toggleReseed() {
  if (reseedInterval) {
    if (confirm('Disable reseeding?')) {
      reseedInterval = null;
      updateReseedUI();
      log('Reseeding disabled');
    }
  } else {
    const seconds = prompt('Enter reseed interval in seconds (10-300):', '10');
    if (seconds && !isNaN(seconds) && seconds >= 10 && seconds <= 300) {
      reseedInterval = parseInt(seconds);
      updateReseedUI();
      log(`Reseeding enabled: ${reseedInterval}s`);
    }
  }
}

function updateReseedUI() {
  const bar = document.getElementById('reseed-bar');
  const text = document.getElementById('reseed-text');
  if (reseedInterval) {
    bar.classList.add('active');
    text.textContent = `Every ${reseedInterval} seconds`;
  } else {
    bar.classList.remove('active');
    text.textContent = 'Disabled';
  }
}

function refreshStatus() {
  // In real implementation, fetch status from backend
  // For now, show placeholder
  let tier1Running = 0, tier2Running = 0;
  
  SERVICES.tier1.forEach(svc => {
    const el = document.getElementById(`status-${svc.id}`);
    if (el) {
      // Simulate - would check actual container status
      el.textContent = 'STOPPED';
      el.className = 'service-status stopped';
    }
  });
  
  document.getElementById('tier1-count').textContent = `${tier1Running}/${SERVICES.tier1.length} running`;
  document.getElementById('tier2-count').textContent = `${tier2Running}/${SERVICES.tier2.length} running`;
}

function clearOutput() {
  document.getElementById('output').textContent = '';
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  renderServices();
  refreshStatus();
  
  // Auto-refresh every 10 seconds
  setInterval(refreshStatus, 10000);
});
</script>
</body>
</html>
