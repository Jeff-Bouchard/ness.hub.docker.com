

services:
  emercoin-core:
    image: nessnetwork/emercoin-core:latest
    container_name: emercoin-core
    volumes:
      - emercoin-data:/data
    ports:
      - "6661:6661"
      - "6662:6662"
    restart: unless-stopped
    healthcheck:
      # Simple liveness check: ensure main process (PID 1, emercoind) is running
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ness-network

  pyuheprng-privatenesstools:
    image: nessnetwork/pyuheprng-privatenesstools:latest
    container_name: pyuheprng-privatenesstools
    privileged: true
    devices:
      - /dev/random
    volumes:
      - /dev:/dev
    ports:
      - "5000:5000"    # pyuheprng
      - "8888:8888"    # privatenesstools
    restart: unless-stopped
    environment:
      - MIN_ENTROPY_RATE=250
      - BLOCK_ON_LOW_ENTROPY=true
    networks:
      - ness-network

  dns-reverse-proxy:
    image: nessnetwork/dns-reverse-proxy:latest
    container_name: dns-reverse-proxy
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8053:8053"
    environment:
      - EMERCOIN_HOST=emercoin-core
      - EMERCOIN_PORT=6662
      - EMERCOIN_COOKIE_FILE=/data/.cookie
      - DNS_NVS_KEY=ness:dns-reverse-proxy-config
    volumes:
      - emercoin-data:/data:ro
    restart: unless-stopped
    depends_on:
      - emercoin-core
    networks:
      - ness-network

  privateness:
    image: nessnetwork/privateness:latest
    container_name: privateness
    ports:
      - "6006:6006"  # P2P
      - "6660:6660"  # RPC
    restart: unless-stopped
    depends_on:
      - emercoin-core
      - dns-reverse-proxy
      - pyuheprng-privatenesstools
    networks:
      - ness-network

  ipfs:
    image: nessnetwork/ipfs:latest
    container_name: ipfs
    volumes:
      - ipfs-data:/data/ipfs
    ports:
      - "4001:4001"     # P2P swarm
      - "5001:5001"     # API
      - "8080:8080"     # Gateway
      - "8081:8081"     # WebUI
    environment:
      - IPFS_STORAGE_MAX=50GB
    restart: unless-stopped
    networks:
      - ness-network

volumes:
  emercoin-data:
  ipfs-data:

networks:
  ness-network:
    driver: bridge
