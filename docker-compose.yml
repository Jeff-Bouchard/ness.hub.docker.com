services:
  emercoin-core:
    image: nessnetwork/emercoin-core
    container_name: emercoin-core
    ports:
      - "${EMERCOIN_PORT_P2P:-6661}:6661"
      - "${EMERCOIN_PORT_RPC:-6662}:6662"
      
    volumes:
      - emercoin-data:/data
    restart: unless-stopped
    healthcheck:
      # Simple liveness check: ensure main process (PID 1, emercoind) is running
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  yggdrasil:
    image: nessnetwork/yggdrasil
    container_name: yggdrasil
    command: >
      sh -c 'if [ ! -f /etc/yggdrasil.conf ]; then yggdrasil -genconf > /etc/yggdrasil.conf; fi;
      exec yggdrasil -useconffile /etc/yggdrasil.conf'
    ports:
      - "${YGGDRASIL_PORT:-9001}:9001"
    volumes:
      - yggdrasil-data:/etc/yggdrasil
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    depends_on:
      emercoin-core:
        condition: service_healthy

  i2p-yggdrasil:
    image: nessnetwork/i2p-yggdrasil
    container_name: i2p-yggdrasil
    ports:
      - "${I2P_CONSOLE_PORT:-7657}:7657"
      - "${I2P_HTTP_PROXY:-4444}:4444"
      - "${I2P_IRC_PORT:-6668}:6668"
      - "${YGGDRASIL_ADMIN_PORT:-9002}:9002"
    volumes:
      - i2p-data:/var/lib/i2p
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv6.conf.all.forwarding=1
    depends_on:
      - yggdrasil

  skywire:
    image: nessnetwork/skywire
    container_name: skywire
    ports:
      - "${SKYWIRE_PORT:-8000}:8000"
    volumes:
      - skywire-data:/root/.skywire
    restart: unless-stopped
    depends_on:
      emercoin-core:
        condition: service_healthy

  ssh-gateway:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: ssh-gateway
    env_file:
      - ./.ssh-admin.env
    environment:
      - PUID=0
      - PGID=0
      - SUDO_ACCESS=true
      - PASSWORD_ACCESS=true
      - USER_NAME=root
    ports:
      - "${SSH_GATEWAY_PORT:-2222}:2222"
    volumes:
      - ssh-gateway-config:/config
    restart: unless-stopped
    networks:
      - ness-network

  softether-vpn:
    build: ./softether
    container_name: softether-vpn
    environment:
      - SOFTETHER_ADMIN_PASSWORD=${SOFTETHER_ADMIN_PASSWORD:-changeme}
      - SOFTETHER_ENABLE_WG=1
    ports:
      - "${SOFTETHER_VPN_PORT:-443}:443/udp"
    expose:
      - "5555"
    volumes:
      - softether-data:/usr/local/vpnserver
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    networks:
      - ness-network
    depends_on:
      emercoin-core:
        condition: service_healthy

  privateness:
    image: nessnetwork/privateness
    container_name: privateness
    ports:
      - "${PRIVATENESS_PORT_P2P:-6006}:6006"
      - "${PRIVATENESS_PORT_RPC:-6660}:6660"
    environment:
      - RPC_ADDR=http://127.0.0.1:6660
      - COIN=privateness
      - USER_MAX_DECIMALS=6
      - PRIVATENESS_GUI_DIR=/opt/privateness/gui/static
    restart: unless-stopped
    depends_on:
      - emercoin-core
      - dns-reverse-proxy

  pyuheprng-privatenesstools:
    image: nessnetwork/pyuheprng-privatenesstools
    container_name: pyuheprng-privatenesstools
    ports:
      - "${PYUHEPRNG_PORT:-5000}:5000"
      - "${PRIVATENESSTOOLS_PORT:-8888}:8888"
    restart: unless-stopped
    depends_on:
      emercoin-core:
        condition: service_healthy
      privateness:
        condition: service_started

  dns-reverse-proxy:
    image: nessnetwork/dns-reverse-proxy
    container_name: dns-reverse-proxy
    ports:
      - "1053:${DNS_PORT_UDP:-53}/udp"
      - "1053:${DNS_PORT_TCP:-53}/tcp"
      - "${DNS_API_PORT:-8053}:8053"
    environment:
      - EMERCOIN_HOST=emercoin-core
      - EMERCOIN_PORT=${EMERCOIN_PORT_RPC:-6662}
      - EMERCOIN_COOKIE_FILE=/data/.cookie
      - DNS_NVS_KEY=ness:dns-reverse-proxy-config
    volumes:
      - emercoin-data:/data:ro
    restart: unless-stopped
    depends_on:
      - emercoin-core

volumes:
  emercoin-data:
  yggdrasil-data:
  i2p-data:
  skywire-data:
  ssh-gateway-config:
  softether-data:

networks:
  ness-network:
    driver: bridge
