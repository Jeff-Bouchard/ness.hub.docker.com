services:
  # --- Tier 0: Network substrate (runs before everything) ---

  lbrtynet:
    build: ./lbrtynet
    container_name: lbrtynet
    ports:
      - "42424:42424/udp"           # peer discovery — must be public for mesh bootstrap
      - "127.0.0.1:5555:5555"       # nanomsg BUS — loopback only, never world-accessible
    volumes:
      - lbrtynet-conf:/etc/lbrtynet
      - lbrtynet-cache:/home/frx/.lbrtynet
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN                   # required: tun/tap interface management
    security_opt:
      - no-new-privileges:true
    networks:
      - ness-network

  softether-vpn:
    build: ./softether
    container_name: softether-vpn
    environment:
      - SOFTETHER_ADMIN_PASSWORD=${SOFTETHER_ADMIN_PASSWORD:?SOFTETHER_ADMIN_PASSWORD must be set}
      - SOFTETHER_ENABLE_WG=1
    ports:
      # --- PUBLIC (intentionally internet-facing) ---
      - "${SOFTETHER_VPN_PORT:-443}:443/udp"        # WireGuard ingress — must be public
      - "${EMERCOIN_PORT_P2P:-6661}:6661"            # Emercoin P2P — must be public for blockchain sync
      - "${SSH_GATEWAY_PORT:-2222}:2222"             # SSH — EmerSSH PKI, pubkey-only
      - "1053:53/udp"                                # DNS — NVS resolver for local clients
      - "1053:53/tcp"
      - "${SKYWIRE_PORT:-8000}:8000"                 # Skywire visor UI — consider VPN-only access
      # --- INTERNAL ONLY (loopback-bound) ---
      - "127.0.0.1:5556:5555"                        # SoftEther admin RPC — never expose publicly
      - "127.0.0.1:${EMERCOIN_PORT_RPC:-6662}:6662"  # Emercoin RPC — credentials in plaintext if exposed
      - "127.0.0.1:${PRIVATENESS_PORT_RPC:-6660}:6660" # NESS RPC — internal only
      - "127.0.0.1:${PYUHEPRNG_PORT:-5550}:5000"    # entropy RPC — internal only
      - "127.0.0.1:${PRIVATENESSTOOLS_PORT:-8888}:8888" # tools API — internal only
      - "127.0.0.1:${DNS_API_PORT:-8053}:8053"       # DNS API — internal NVS queries only
      # --- OVERLAY (only active with profile=overlay|full) ---
      - "127.0.0.1:${YGGDRASIL_PORT:-9001}:9001"    # Yggdrasil — loopback; peers via lbrtynet mesh
      - "127.0.0.1:${I2P_CONSOLE_PORT:-7657}:7657"  # I2P console — admin, never public
      - "127.0.0.1:${I2P_HTTP_PROXY:-4444}:4444"    # I2P proxy — local clients only
    volumes:
      - softether-data:/usr/local/vpnserver
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN                   # required: VPN tunnel management
      - SYS_MODULE                  # required: kernel module loading for tun/tap
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped
    networks:
      - ness-network
    depends_on:
      lbrtynet:
        condition: service_healthy

  # --- Tier 1+ services ---

  emercoin-core:
    image: nessnetwork/emercoin-core
    container_name: emercoin-core
    network_mode: "service:softether-vpn"
    volumes:
      - emercoin-data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      softether-vpn:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Optional overlay routes (Tier 2 / full profile only) ---

  yggdrasil:
    image: nessnetwork/yggdrasil
    container_name: yggdrasil
    network_mode: "service:softether-vpn"
    command: >
      sh -c 'if [ ! -f /etc/yggdrasil.conf ]; then yggdrasil -genconf > /etc/yggdrasil.conf; fi;
      exec yggdrasil -useconffile /etc/yggdrasil.conf'
    volumes:
      - yggdrasil-data:/etc/yggdrasil
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    profiles: [overlay, full]
    depends_on:
      softether-vpn:
        condition: service_started

  i2p-yggdrasil:
    image: nessnetwork/i2p-yggdrasil
    container_name: i2p-yggdrasil
    network_mode: "service:softether-vpn"
    volumes:
      - i2p-data:/var/lib/i2p
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
    profiles: [overlay, full]
    depends_on:
      softether-vpn:
        condition: service_started
      yggdrasil:
        condition: service_started

  skywire:
    image: nessnetwork/skywire
    container_name: skywire
    network_mode: "service:softether-vpn"
    volumes:
      - skywire-data:/root/.skywire
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      softether-vpn:
        condition: service_started
      emercoin-core:
        condition: service_healthy

  ssh-gateway:
    build:
      context: .
      dockerfile: ssh-gateway/Dockerfile
    container_name: ssh-gateway
    network_mode: "service:softether-vpn"
    environment:
      - EMC_RPC_USER=${EMERCOIN_RPC_USER:-emercoin}
      - EMC_RPC_PASS=${EMERCOIN_RPC_PASS:?EMC_RPC_PASS must be set}
      - SSH_ADMIN_PUBKEY=${SSH_ADMIN_PUBKEY:-}
    volumes:
      - ssh-gateway-config:/etc/ssh
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
      - /var/run/sshd:noexec,nosuid,size=4m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      softether-vpn:
        condition: service_started
      emercoin-core:
        condition: service_started

  privateness:
    image: nessnetwork/privateness
    container_name: privateness
    network_mode: "service:softether-vpn"
    environment:
      - RPC_ADDR=http://127.0.0.1:6660
      - COIN=privateness
      - USER_MAX_DECIMALS=6
      - PRIVATENESS_GUI_DIR=/opt/privateness/gui/static
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      softether-vpn:
        condition: service_started
      emercoin-core:
        condition: service_started
      dns-reverse-proxy:
        condition: service_started

  pyuheprng-privatenesstools:
    image: nessnetwork/pyuheprng-privatenesstools
    container_name: pyuheprng-privatenesstools
    network_mode: "service:softether-vpn"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    depends_on:
      softether-vpn:
        condition: service_started
      emercoin-core:
        condition: service_healthy
      privateness:
        condition: service_started

  dns-reverse-proxy:
    image: nessnetwork/dns-reverse-proxy
    container_name: dns-reverse-proxy
    network_mode: "service:softether-vpn"
    environment:
      - EMERCOIN_HOST=127.0.0.1
      - EMERCOIN_PORT=${EMERCOIN_PORT_RPC:-6662}
      - EMERCOIN_COOKIE_FILE=/data/.cookie
      - DNS_NVS_KEY=ness:dns-reverse-proxy-config
    volumes:
      - emercoin-data:/data:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=8m
    security_opt:
      - no-new-privileges:true
    depends_on:
      softether-vpn:
        condition: service_started
      emercoin-core:
        condition: service_started

volumes:
  lbrtynet-conf:
  lbrtynet-cache:
  emercoin-data:
  yggdrasil-data:
  i2p-data:
  skywire-data:
  ssh-gateway-config:
  softether-data:

networks:
  ness-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"   # containers cannot reach each other directly on bridge
      com.docker.network.bridge.enable_ip_masquerade: "true"
