version: '3.8'

# Portainer Stack - Tier 2 (Tier1 + overlays / VPN / IPFS)
# Cumulative: includes all Tier1 core services plus Tier2 overlays.
# Deploy this stack *instead of* Tier1 on capable hardware; do not
# deploy Tier1 and Tier2 YAMLs together for the same node.

services:
  emercoin-core:
    image: nessnetwork/emercoin-core:latest
    container_name: emercoin-core
    ports:
    - "6661:6661"
    - "6662:6662"
    - "8775:8775"
    volumes:
    - emercoin-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "emercoin-cli", "-datadir=/data", "getinfo" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=blockchain"
    - "com.privateness.layer=foundation"
    - "com.privateness.tier=2"

  dns-reverse-proxy:
    image: nessnetwork/dns-reverse-proxy:latest
    container_name: dns-reverse-proxy
    ports:
    - "53:53/udp"
    - "53:53/tcp"
    - "8053:8053"
    restart: unless-stopped
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=dns"
    - "com.privateness.layer=application"
    - "com.privateness.tier=2"
    depends_on:
    - emercoin-core

  privateness:
    image: nessnetwork/privateness:latest
    container_name: privateness
    ports:
    - "6006:6006"
    - "6660:6660"
    restart: unless-stopped
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=core"
    - "com.privateness.layer=application"
    - "com.privateness.tier=2"
    depends_on:
    - emercoin-core
    - dns-reverse-proxy

  pyuheprng:
    image: nessnetwork/pyuheprng:latest
    container_name: pyuheprng
    privileged: true
    devices:
    - /dev/random
    volumes:
    - /dev:/dev
    ports:
    - "5000:5000"
    restart: unless-stopped
    environment:
    - EMERCOIN_HOST=emercoin-core
    - EMERCOIN_PORT=6662
    - EMERCOIN_COOKIE_FILE=/data/.cookie
    - MIN_ENTROPY_RATE=1000
    - BLOCK_ON_LOW_ENTROPY=true
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=entropy"
    - "com.privateness.layer=security"
    - "com.privateness.description=Cryptographic entropy - feeds /dev/random"
    - "com.privateness.tier=2"
    depends_on:
      emercoin-core:
        condition: service_healthy

  privatenesstools:
    image: nessnetwork/privatenesstools:latest
    container_name: privatenesstools
    ports:
    - "8888:8888"
    restart: unless-stopped
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=tools"
    - "com.privateness.layer=application"
    - "com.privateness.tier=2"
    depends_on:
    - emercoin-core
    - privateness

  yggdrasil:
    image: nessnetwork/yggdrasil:latest
    container_name: yggdrasil
    ports:
    - "9001:9001"
    volumes:
    - yggdrasil-data:/etc/yggdrasil
    restart: unless-stopped
    cap_add:
    - NET_ADMIN
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=mesh-network"
    - "com.privateness.layer=network"
    - "com.privateness.tier=2"

  i2p-yggdrasil:
    image: nessnetwork/i2p-yggdrasil:latest
    container_name: i2p-yggdrasil
    ports:
    - "7657:7657"
    - "4444:4444"
    - "6668:6668"
    - "9002:9002"
    volumes:
    - i2p-data:/var/lib/i2p
    restart: unless-stopped
    cap_add:
    - NET_ADMIN
    - SYS_MODULE
    devices:
    - /dev/net/tun
    sysctls:
    - net.ipv6.conf.all.forwarding=1
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=anonymity"
    - "com.privateness.layer=network"
    - "com.privateness.tier=2"
    depends_on:
    - yggdrasil

  ipfs:
    image: nessnetwork/ipfs:latest
    container_name: ipfs
    ports:
    - "4001:4001/tcp"
    - "4001:4001/udp"
    - "5001:5001/tcp"
    - "8080:8080/tcp"
    restart: unless-stopped
    labels:
    - "io.portainer.accesscontrol.teams=privateness"
    - "com.privateness.service=ipfs"
    - "com.privateness.layer=storage"
    - "com.privateness.tier=2"

volumes:
  emercoin-data:
    labels:
    - "com.privateness.volume=blockchain-data"
  yggdrasil-data:
    labels:
    - "com.privateness.volume=mesh-config"
  i2p-data:
    labels:
    - "com.privateness.volume=anonymity-data"

networks:
  default:
    name: ness-network-tier2
    driver: bridge
    labels:
    - "com.privateness.network=tier2"
