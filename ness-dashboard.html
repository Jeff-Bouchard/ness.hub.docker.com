<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NESS Control</title>
<style>
body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
.tree { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; }
.item { padding: 8px; cursor: pointer; border-radius: 4px; }
.item:hover { background: #21262d; }
.children { margin-left: 30px; border-left: 2px solid #30363d; }
.status { float: right; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
.running { background: #238636; }
.stopped { background: #da3633; }
button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px 20px; margin: 5px; border-radius: 6px; cursor: pointer; }
button:hover { background: #30363d; }
.output { background: #0d1117; border: 1px solid #30363d; padding: 15px; margin-top: 20px; min-height: 200px; white-space: pre-wrap; font-size: 13px; }
</style>
</head>
<body>
<h2>NESS Hub Control</h2>
<div class="tree">
  <div class="item" onclick="toggle(this)">
    📁 NESS Stack <span class="status" id="stack-status">Unknown</span>
  </div>
  <div class="children" id="stack-children">
    <div class="item">⛓️ Emercoin Core <span class="status" id="s1">-</span></div>
    <div class="item">🔒 Privateness <span class="status" id="s2">-</span></div>
    <div class="item">📡 Skywire <span class="status" id="s3">-</span></div>
    <div class="item">🌐 DNS Proxy <span class="status" id="s4">-</span></div>
    <div class="item">🎲 Tools <span class="status" id="s5">-</span></div>
  </div>
</div>
<div>
  <button onclick="start()">▶ Start</button>
  <button onclick="stop()">⏹ Stop</button>
  <button onclick="status()">🔄 Status</button>
  <button onclick="logs()">📋 Logs</button>
</div>
<div class="output" id="out">Ready. Click a button.</div>
<script>
function toggle(el) {
  const ch = document.getElementById('stack-children');
  ch.style.display = ch.style.display === 'none' ? 'block' : 'none';
}
function log(msg) {
  document.getElementById('out').innerHTML += '\n[' + new Date().toLocaleTimeString() + '] ' + msg;
}
function start() {
  log('Starting stack...');
  fetch('/api/exec', {method:'POST', body:JSON.stringify({cmd:'./menu'})})
    .then(r => r.json()).then(d => log(d.out || 'Started'))
    .catch(e => log('Error: ' + e));
  setTimeout(status, 3000);
}
function stop() {
  log('Stopping stack...');
  fetch('/api/exec', {method:'POST', body:JSON.stringify({cmd:'podman-compose down'})})
    .then(r => r.json()).then(d => log(d.out || 'Stopped'))
    .catch(e => log('Error: ' + e));
  setTimeout(status, 2000);
}
function status() {
  fetch('/api/exec', {method:'POST', body:JSON.stringify({cmd:'podman-compose ps'})})
    .then(r => r.json()).then(d => {
      log(d.out || 'No output');
      // Update status indicators
      const out = d.out || '';
      ['emercoin-core','privateness','skywire','dns-reverse-proxy','pyuheprng'].forEach((s,i) => {
        const el = document.getElementById('s'+(i+1));
        if(el) el.className = 'status ' + (out.includes(s) && out.includes('Up') ? 'running' : 'stopped');
      });
    })
    .catch(e => log('Error: ' + e));
}
function logs() {
  fetch('/api/exec', {method:'POST', body:JSON.stringify({cmd:'podman-compose logs --tail=50'})})
    .then(r => r.json()).then(d => log(d.out || 'No logs'))
    .catch(e => log('Error: ' + e));
}
// Auto status update
setInterval(status, 30000);
status();
</script>
</body>
</html>
